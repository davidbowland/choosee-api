  SubscribeRoundFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/subscribe-round.handler
      MemorySize: 512
      Description: choosee-api subscribe user to round notifications
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/rounds/{roundId}/subscribe
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/rounds/{roundId}/subscribe
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/subscribe-round.ts

  SubscribeRoundLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SubscribeRoundFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  SubscribeRoundLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref SubscribeRoundLogGroup

  ## Share / SMS

  ShareSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/share-session.handler
      MemorySize: 1536
      Description: choosee-api share session via SMS
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          CORS_DOMAIN: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: '20'
          SMS_API_KEY: !Ref SmsApiKey
          SMS_API_URL: !FindInMap [EnvironmentMap, !Ref Environment, smsApiUrl]
          SMS_RATE_LIMIT_PER_USER: '5'
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/share
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
