AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for choosee project

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy
  GoogleApiKey:
    Type: String
    Description: API key for Google Maps API
    NoEcho: true
  RecaptchaSecretKey:
    Type: String
    Description: Secret key for reCAPTCHA v3
    NoEcho: true
  SmsApiKey:
    Type: String
    Description: API key for sms-queue-api
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 client ID
  GoogleClientSecret:
    Type: String
    Description: Google OAuth 2.0 client secret
    NoEcho: true

Mappings:
  EnvironmentMap:
    prod:
      certificateEdge: adce1a21-90b4-4120-8548-111215e582f0
      certificateRegional: 5d4db894-c9fc-42ca-8f80-3c5da6c1678e
      corsDomain: https://choosee.dbowland.com
      domain: choosee-api.dbowland.com
      domainInternal: choosee-api-internal.dbowland.com
      logStreamFunction: log-subscriber
      sessionsTable: choosee-api-sessions
      smsApiUrl: https://sms-queue-api.dbowland.com/v1
      zoneId: Z072422417XWM8PIXXSFA
    test:
      certificateEdge: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      certificateRegional: 14a32175-0c26-4768-b71f-3fa611b8f5a2
      corsDomain: https://choosee.bowland.link
      domain: choosee-api.bowland.link
      domainInternal: choosee-api-internal.bowland.link
      logStreamFunction: log-subscriber-test
      sessionsTable: choosee-api-sessions-test
      smsApiUrl: https://sms-queue-api.bowland.link/v1
      zoneId: Z01312547RGU1BYKIJXY

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    Tracing: Active
    Tags:
      'created-by': 'choosee-api'
      'created-for': 'choosee'
      'environment': !Ref Environment
    Environment:
      Variables:
        NODE_OPTIONS: '--disable-warning DEP0040'

Resources:
  # API Gateway

  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: Usage plan for choosee-api
      Domain:
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domainInternal]
        CertificateArn: !Sub
          - 'arn:aws:acm:us-east-1:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificateEdge]
        EndpointConfiguration: EDGE
        Route53:
          HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
        BasePath:
          - /v1

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub
                - 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
                - UserPool: !Ref UserPool
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
          - X-Recaptcha-Token
        AllowMethods:
          - DELETE
          - GET
          - OPTIONS
          - PATCH
          - POST
          - PUT
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificateRegional]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
      FailOnWarnings: true
      StageName: v1

  HttpRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      AliasTarget:
        DNSName: !Sub '${HttpApi.DomainName.RegionalDomainName}'
        HostedZoneId: !Sub '${HttpApi.DomainName.RegionalHostedZoneId}'
      HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      Name: !FindInMap [EnvironmentMap, !Ref Environment, domain]
      Type: A

  # Lambda

  ## Sessions

  PostSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: choosee-api post session (unauthenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref CreateSessionFunction
      Environment:
        Variables:
          CREATE_SESSION_FUNCTION_NAME: !Ref CreateSessionFunction
          CREATE_SESSION_TIMEOUT_MS: '80000'
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          RADIUS_MIN_MILES: '1'
          RADIUS_MAX_MILES: '30'
          RADIUS_DEFAULT_MILES: '15'
          RECAPTCHA_SECRET_KEY: !Ref RecaptchaSecretKey
          SESSION_EXPIRE_HOURS: '24'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionLogGroup

  PostSessionAuthedFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: choosee-api post session (authenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref CreateSessionFunction
      Environment:
        Variables:
          CREATE_SESSION_FUNCTION_NAME: !Ref CreateSessionFunction
          CREATE_SESSION_TIMEOUT_MS: '80000'
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          RADIUS_MIN_MILES: '1'
          RADIUS_MAX_MILES: '30'
          RADIUS_DEFAULT_MILES: '15'
          RECAPTCHA_SECRET_KEY: !Ref RecaptchaSecretKey
          SESSION_EXPIRE_HOURS: '24'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/authed
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionAuthedLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionAuthedFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionAuthedLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionAuthedLogGroup

  CreateSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create-session.handler
      MemorySize: 2048
      Description: choosee-api async session creation (Google Places lookup)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          GOOGLE_API_KEY: !Ref GoogleApiKey
          GOOGLE_IMAGE_COUNT: '5'
          GOOGLE_IMAGE_MAX_HEIGHT: '300'
          GOOGLE_IMAGE_MAX_WIDTH: '400'
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/create-session.ts

  CreateSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CreateSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  CreateSessionLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref CreateSessionLogGroup

  GetSessionByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-session-by-id.handler
      MemorySize: 1536
      Description: choosee-api get session by ID
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}
            Method: get
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-session-by-id.ts

  GetSessionByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetSessionByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  GetSessionByIdLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetSessionByIdLogGroup

  ## Choices

  GetChoicesFunction:
