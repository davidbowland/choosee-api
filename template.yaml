    Properties:
      Handler: src/handlers/post-user.handler
      MemorySize: 512
      Description: choosee-api create authenticated user in session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: '20'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/authed
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-user.ts

  PostUserAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostUserAuthFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'choosee-api'
        - Key: 'created-for'
          Value: 'choosee'
        - Key: 'environment'
          Value: !Ref Environment

  PostUserAuthLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
