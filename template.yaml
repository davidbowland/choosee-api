        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/authed
            Method: patch
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
